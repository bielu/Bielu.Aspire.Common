name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches:
      - main
  release:
    types: [published]

  workflow_dispatch:

permissions:
  contents: read

jobs:
  buildPr:
    if: github.event_name == 'pull_request'
    uses: bielu/bielu.GithubActions.Templates/.github/workflows/ciNoSchema.yml@main
    with:
      suffix: "pr"
    permissions:
      contents: read

  build:
    if: github.event_name == 'release'
    uses: bielu/bielu.GithubActions.Templates/.github/workflows/ciNoSchema.yml@main
    permissions:
      contents: read

  buildBeta:
    if: github.event_name != 'pull_request' && github.event_name != 'release'
    uses: bielu/bielu.GithubActions.Templates/.github/workflows/ciNoSchema.yml@main
    with:
      suffix: "beta"
    permissions:
      contents: read

  deploy:
    needs: [build, buildBeta]
    if: |
      always()
      && contains(needs.*.result, 'success')
      && !contains(needs.*.result, 'failure')
    uses: bielu/bielu.GithubActions.Templates/.github/workflows/releaseNuget.yml@main
    permissions:
      contents: read
    secrets:
      NUGET_APIKEY: ${{ secrets.NUGET_APIKEY }}
